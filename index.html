<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Simple Buddy Allocator Demo</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Simple Buddy</p>
          <h1>Buddy 内存分配演示</h1>
        </div>
        <div class="stats" aria-label="内存状态摘要">
          <div>
            <span id="usedPages">0</span>
            <small>已分配页</small>
          </div>
          <div>
            <span id="freePages">16</span>
            <small>空闲页</small>
          </div>
          <div>
            <span id="largestBlock">2^4</span>
            <small>最大空闲块</small>
          </div>
        </div>
      </header>

      <section class="workspace">
        <aside class="panel controls" aria-label="操作控制">
          <div class="control-grid">
            <label>
              进程
              <input id="processId" maxlength="1" value="A" aria-label="进程名">
            </label>
            <label>
              申请大小 K
              <input id="requestSize" type="number" min="1" max="1024" step="1" value="34">
            </label>
          </div>
          <div class="button-row">
            <button id="allocateBtn" type="button">申请</button>
            <button id="freeBtn" type="button">释放</button>
          </div>
          <div class="button-row secondary">
            <button id="stepBtn" type="button">执行示例下一步</button>
            <button id="playBtn" type="button">自动播放</button>
            <button id="resetBtn" type="button">重置</button>
          </div>
          <label class="speed-control">
            演示速度
            <input id="speedRange" type="range" min="500" max="2400" step="100" value="1200">
            <span id="speedLabel">1.2 秒/步</span>
          </label>
          <div class="script">
            <h2>示例流程</h2>
            <ol id="scriptList"></ol>
          </div>
        </aside>

        <section class="panel board" aria-label="内存布局">
          <div class="board-head">
            <div>
              <h2>16 个 64K 页</h2>
              <p id="message">初始状态：一个 2^4 空闲块覆盖全部内存。</p>
            </div>
            <div class="legend">
              <span><i class="free"></i>空闲</span>
              <span><i class="used"></i>已分配</span>
            </div>
          </div>
          <div id="memory" class="memory" aria-label="内存页"></div>
          <div class="scale" aria-hidden="true">
            <span>0</span>
            <span>4</span>
            <span>8</span>
            <span>12</span>
            <span>16</span>
          </div>
          <div class="areas">
            <h2>Free Area</h2>
            <div id="freeAreas" class="area-list"></div>
          </div>
        </section>

        <section class="panel log-panel" aria-label="操作记录">
          <div class="log-head">
            <h2>步骤记录</h2>
            <button id="clearLogBtn" type="button">清空记录</button>
          </div>
          <div id="log" class="log"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
